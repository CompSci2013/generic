<div class="discover-container">
  <div class="discover-header">
    <h1>{{ domainLabel }}</h1>
    <p class="subtitle">Search and explore data</p>
  </div>

  <div class="discover-content">
    <!-- Filters section -->
    <div class="filters-section">
      <div class="filters-header">
        <h3>Filters</h3>
        <button
          pButton
          type="button"
          label="Clear All"
          icon="pi pi-times"
          class="p-button-text p-button-sm"
          (click)="clearFilters()"
          [disabled]="selectedDataSourceKeys.length === 0">
        </button>
      </div>

      <div class="filters-grid">
        <!-- Data Source Picker -->
        <div class="filter-item">
          <app-table-picker
            [config]="dataSourcePickerConfig"
            [preSelectedKeys]="selectedDataSourceKeys"
            (selectionApply)="onPickerApply($event)"
            (selectionClear)="onPickerClear()">
          </app-table-picker>
        </div>
      </div>

      <div class="results-info">
        <p class="info-text">
          Showing {{ totalRecords | number }} records
          <span *ngIf="loading" class="loading-indicator"> - Loading...</span>
        </p>
      </div>
    </div>

    <!-- Data table -->
    <div class="table-section">
      <app-base-data-table
        [data]="data"
        [columns]="columns"
        [totalRecords]="totalRecords"
        [loading]="loading"
        [rows]="pageSize"
        [paginator]="true"
        [rowsPerPageOptions]="[10, 20, 50, 100]"
        [showGridlines]="true"
        [stripedRows]="true"
        [rowHover]="true"
        dataKey="id"
        (sortChange)="onSort($event)"
        (pageChange)="onPageChange($event)"
      ></app-base-data-table>
    </div>
  </div>
</div>

<p-table
  [value]="data"
  [columns]="getVisibleColumns()"
  [lazy]="true"
  [loading]="loading"
  [totalRecords]="totalRecords"
  [paginator]="paginator"
  [rows]="rows"
  [rowsPerPageOptions]="rowsPerPageOptions"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
  [styleClass]="styleClass + (showGridlines ? ' p-datatable-gridlines' : '') + (stripedRows ? ' p-datatable-striped' : '')"
  [scrollHeight]="scrollHeight || ''"
  [rowHover]="rowHover"
  [dataKey]="dataKey || 'id'"
  [selectionMode]="selectionMode"
  [(selection)]="selection"
  [expandedRowKeys]="expandedRows"
  (onSort)="onSort($event)"
  (onPage)="onPage($event)"
  (onRowSelect)="onRowSelect($event)"
  (onRowExpand)="onRowExpand($event)"
  (onRowCollapse)="onRowCollapse($event)"
  responsiveLayout="scroll"
>
  <!-- Header -->
  <ng-template pTemplate="header" let-columns>
    <tr>
      <!-- Expander column -->
      <th *ngIf="expandable" style="width: 3rem"></th>

      <!-- Data columns -->
      <th
        *ngFor="let col of columns; trackBy: trackByField"
        [pSortableColumn]="col.sortable ? col.field : null"
        [ngClass]="getAlignClass(col)"
        [class]="col.cssClass"
        [ngStyle]="{ width: col.width, 'min-width': col.minWidth }"
      >
        {{ col.header }}
        <p-sortIcon *ngIf="col.sortable" [field]="col.field"></p-sortIcon>
      </th>
    </tr>
  </ng-template>

  <!-- Body -->
  <ng-template pTemplate="body" let-row let-columns="columns" let-expanded="expanded">
    <tr [pSelectableRow]="row">
      <!-- Expander cell -->
      <td *ngIf="expandable">
        <button
          type="button"
          pButton
          pRipple
          [pRowToggler]="row"
          class="p-button-text p-button-rounded p-button-plain"
          [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'"
        ></button>
      </td>

      <!-- Data cells -->
      <td
        *ngFor="let col of columns; trackBy: trackByField"
        [ngClass]="getAlignClass(col)"
        [class]="col.cssClass"
      >
        <!-- Custom template if provided -->
        <ng-container *ngIf="col.template; else defaultCell">
          <ng-container
            *ngTemplateOutlet="col.template; context: { $implicit: row, column: col }"
          ></ng-container>
        </ng-container>

        <!-- Default cell rendering -->
        <ng-template #defaultCell>
          {{ getCellValue(row, col) }}
        </ng-template>
      </td>
    </tr>
  </ng-template>

  <!-- Row expansion template -->
  <ng-template
    *ngIf="expandable"
    pTemplate="rowexpansion"
    let-row
  >
    <tr>
      <td [attr.colspan]="getVisibleColumns().length + 1">

        <!-- Loading state -->
        <div *ngIf="isDetailLoading(row)" class="detail-loading">
          <i class="pi pi-spin pi-spinner"></i>
          <span>{{ getDetailLoadingMessage() }}</span>
        </div>

        <!-- Detail content -->
        <div *ngIf="!isDetailLoading(row)" class="detail-content" [ngClass]="detailConfig?.styleClass">

          <!-- Nested table mode -->
          <div *ngIf="detailConfig && isNestedTableMode()" class="nested-table-container">
            <p-table
              *ngIf="getDetailItems(row).length > 0"
              [value]="getDetailItems(row)"
              [columns]="getDetailColumns()"
              [scrollHeight]="getDetailScrollHeight()"
              [styleClass]="getDetailTableClass()"
              [rowHover]="detailConfig.rowHover !== false"
              [dataKey]="detailConfig.getDetailId ? 'id' : 'id'"
              [paginator]="detailConfig.detailPaginator === true"
              [rows]="detailConfig.detailRows || 10"
              [rowsPerPageOptions]="getDetailRowsPerPageOptions()"
              responsiveLayout="scroll"
            >
              <!-- Nested table header -->
              <ng-template pTemplate="header" let-columns>
                <tr>
                  <th
                    *ngFor="let col of columns"
                    [pSortableColumn]="col.sortable ? col.field : null"
                    [ngClass]="getAlignClass(col)"
                    [class]="col.cssClass"
                    [ngStyle]="{ width: col.width, 'min-width': col.minWidth }"
                  >
                    {{ col.header }}
                    <p-sortIcon *ngIf="col.sortable" [field]="col.field"></p-sortIcon>
                  </th>
                </tr>
              </ng-template>

              <!-- Nested table body -->
              <ng-template pTemplate="body" let-detailRow let-columns="columns">
                <tr>
                  <td
                    *ngFor="let col of columns"
                    [ngClass]="getAlignClass(col)"
                    [class]="col.cssClass"
                  >
                    <ng-container *ngIf="col.template; else defaultDetailCell">
                      <ng-container
                        *ngTemplateOutlet="col.template; context: { $implicit: detailRow, column: col }"
                      ></ng-container>
                    </ng-container>

                    <ng-template #defaultDetailCell>
                      {{ getCellValue(detailRow, col) }}
                    </ng-template>
                  </td>
                </tr>
              </ng-template>

              <!-- Nested table empty message -->
              <ng-template pTemplate="emptymessage">
                <tr>
                  <td [attr.colspan]="getDetailColumns().length">
                    {{ getDetailEmptyMessage() }}
                  </td>
                </tr>
              </ng-template>
            </p-table>

            <!-- Empty state for details -->
            <div *ngIf="getDetailItems(row).length === 0" class="detail-empty">
              <i class="pi pi-info-circle"></i>
              <span>{{ getDetailEmptyMessage() }}</span>
            </div>
          </div>

          <!-- Custom template mode -->
          <div *ngIf="getDetailTemplate() && !isNestedTableMode() && getDetailTemplate()">
            <ng-container
              *ngTemplateOutlet="getDetailTemplate()!; context: { $implicit: row, details: getDetailItems(row) }"
            ></ng-container>
          </div>

          <!-- Legacy expansion template support -->
          <div *ngIf="!detailConfig && expansionTemplate">
            <ng-container
              *ngTemplateOutlet="expansionTemplate; context: { $implicit: row }"
            ></ng-container>
          </div>

        </div>
      </td>
    </tr>
  </ng-template>

  <!-- Empty message -->
  <ng-template pTemplate="emptymessage" let-columns>
    <tr>
      <td [attr.colspan]="getVisibleColumns().length + (expandable ? 1 : 0)">
        No records found.
      </td>
    </tr>
  </ng-template>
</p-table>
